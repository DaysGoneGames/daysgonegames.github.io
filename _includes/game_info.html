<!-- Game Info Section -->
    <section id="game">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <img src="img/logos/Underveil-logo.png" alt="Underveil" class="img-responsive" style="max-width: 500px; margin: 0 auto 30px;">
                    <h3 class="section-subheading text-muted" style="margin-bottom: 40px; max-width: 800px; margin-left: auto; margin-right: auto;">As the sole prophet, you must assemble and dispatch your expeditionary force across decades of history—paying the price to venture beyond the veil and uncover hidden truths. Ultimately, you must bring true peace to this world and its people.</h3>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-12">
                    <!-- Game Screenshots Carousel -->
                    <div id="gameCarousel" class="carousel slide" data-ride="carousel">
                        <ol class="carousel-indicators">
                            <li data-target="#gameCarousel" data-slide-to="0" class="active"></li>
                            <li data-target="#gameCarousel" data-slide-to="1"></li>
                            <li data-target="#gameCarousel" data-slide-to="2"></li>
                            <li data-target="#gameCarousel" data-slide-to="3"></li>
                        </ol>
                        <div class="carousel-inner">
                            <div class="item active">
                                <img src="img/game_info/1.png" alt="Underveil Screenshot 1" class="img-responsive img-centered game-screenshot" data-toggle="modal" data-target="#lightboxModal" data-img="img/game_info/1.png">
                            </div>
                            <div class="item">
                                <img src="img/game_info/2.png" alt="Underveil Screenshot 2" class="img-responsive img-centered game-screenshot" data-toggle="modal" data-target="#lightboxModal" data-img="img/game_info/2.png">
                            </div>
                            <div class="item">
                                <img src="img/game_info/3.png" alt="Underveil Screenshot 3" class="img-responsive img-centered game-screenshot" data-toggle="modal" data-target="#lightboxModal" data-img="img/game_info/3.png">
                            </div>
                            <div class="item">
                                <img src="img/game_info/4.png" alt="Underveil Screenshot 4" class="img-responsive img-centered game-screenshot" data-toggle="modal" data-target="#lightboxModal" data-img="img/game_info/4.png">
                            </div>
                        </div>
                        <a class="left carousel-control" href="#gameCarousel" data-slide="prev">
                            <span class="glyphicon glyphicon-chevron-left"></span>
                        </a>
                        <a class="right carousel-control" href="#gameCarousel" data-slide="next">
                            <span class="glyphicon glyphicon-chevron-right"></span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="modal fade" id="lightboxModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="background: rgba(0,0,0,0.9); border: none;">
                <div class="modal-body text-center" style="padding: 0;">
                    <img src="" id="lightboxImage" class="img-responsive" style="max-width: 100%; margin: 0 auto; cursor: pointer;" data-dismiss="modal">
                </div>
            </div>
        </div>
    </div>
